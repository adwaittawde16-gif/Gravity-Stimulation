<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gravity Simulation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a12;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      gap: 12px;
    }
    #ui {
      width: 100%;
      max-width: 900px;
      background: #12121e;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 16px 20px;
    }
    h2 {
      font-size: 18px;
      font-weight: 500;
      color: #c9b8ff;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    .ctrl-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 10px;
    }
    .ctrl-row label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #aaa;
    }
    .ctrl-row input[type="range"] {
      width: 100px;
      accent-color: #c9b8ff;
      cursor: pointer;
    }
    .ctrl-row span {
      font-size: 12px;
      font-weight: 600;
      min-width: 30px;
      color: #fff;
    }
    .btn-row { display: flex; gap: 10px; margin-bottom: 10px; }
    button {
      font-size: 12px;
      font-family: 'Courier New', monospace;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid #3a3a5a;
      background: #1e1e30;
      color: #c9b8ff;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #2a2a44; }
    button:active { transform: scale(0.97); }
    .stat-row { display: flex; gap: 20px; font-size: 12px; color: #888; margin-bottom: 6px; }
    .stat-row b { color: #fff; font-weight: 600; }
    .hint { font-size: 11px; color: #555; }
    canvas#gc {
      display: block;
      width: 100%;
      max-width: 900px;
      height: 500px;
      border-radius: 12px;
      border: 1px solid #2a2a3a;
      background: #0a0a12;
      cursor: crosshair;
    }
  </style>
</head>
<body>
  <div id="ui">
    <h2>Gravity Simulator</h2>
    <div class="ctrl-row">
      <label>G constant <input type="range" id="G" min="100" max="3000" value="800" step="50"><span id="Gval">800</span></label>
      <label>Bodies <input type="range" id="numB" min="2" max="30" value="8" step="1"><span id="numBval">8</span></label>
      <label>Trail <input type="range" id="trail" min="0" max="120" value="50" step="5"><span id="trailval">50</span></label>
    </div>
    <div class="btn-row">
      <button id="resetBtn">Reset</button>
      <button id="pauseBtn">Pause</button>
      <button id="addSunBtn">+ Sun</button>
    </div>
    <div class="stat-row">
      <span>Bodies: <b id="bodyCount">0</b></span>
      <span>Merged: <b id="mergedCount">0</b></span>
    </div>
    <p class="hint">Drag &amp; release on canvas to throw a body. Bodies merge on collision.</p>
  </div>
  <canvas id="gc"></canvas>

  <script>
    const canvas = document.getElementById('gc');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.offsetWidth;
      H = canvas.offsetHeight || 500;
      canvas.width = W;
      canvas.height = H;
    }
    resize();
    window.addEventListener('resize', resize);

    const COLORS = ['#7fc8f8','#f7b267','#f25c54','#a5ffd6','#c9b8ff','#ffdd94','#ff9de2','#88d8b0','#ffb347','#b5ead7'];
    let bodies = [], paused = false, merged = 0, G = 800, TRAIL = 50;
    const dtFixed = 1 / 120;

    function rnd(a, b) { return a + Math.random() * (b - a); }

    function spawnBodies(n) {
      bodies = [];
      merged = 0;
      for (let i = 0; i < n; i++) {
        const m = rnd(3, 18);
        bodies.push({
          x: rnd(W * 0.1, W * 0.9),
          y: rnd(H * 0.1, H * 0.9),
          vx: rnd(-60, 60),
          vy: rnd(-60, 60),
          m, r: Math.max(3, m * 1.1),
          col: COLORS[i % COLORS.length],
          trail: []
        });
      }
      updateStats();
    }

    function addSun() {
      const m = 200;
      bodies.push({
        x: W / 2 + rnd(-30, 30), y: H / 2 + rnd(-30, 30),
        vx: 0, vy: 0, m, r: Math.max(14, m * 0.18),
        col: '#ffe07a', trail: []
      });
    }

    let dragStart = null;
    canvas.addEventListener('mousedown', e => {
      const rect = canvas.getBoundingClientRect();
      dragStart = {
        x: (e.clientX - rect.left) * (W / rect.width),
        y: (e.clientY - rect.top) * (H / rect.height),
        t: Date.now()
      };
    });
    canvas.addEventListener('mouseup', e => {
      if (!dragStart) return;
      const rect = canvas.getBoundingClientRect();
      const ex = (e.clientX - rect.left) * (W / rect.width);
      const ey = (e.clientY - rect.top) * (H / rect.height);
      const dt = (Date.now() - dragStart.t) / 1000 + 0.001;
      const m = rnd(5, 15);
      bodies.push({
        x: dragStart.x, y: dragStart.y,
        vx: (ex - dragStart.x) / dt * 0.3,
        vy: (ey - dragStart.y) / dt * 0.3,
        m, r: Math.max(4, m * 1.1),
        col: COLORS[Math.floor(Math.random() * COLORS.length)],
        trail: []
      });
      dragStart = null;
    });

    function step() {
      for (let i = 0; i < bodies.length; i++) {
        let ax = 0, ay = 0;
        for (let j = 0; j < bodies.length; j++) {
          if (i === j) continue;
          const dx = bodies[j].x - bodies[i].x;
          const dy = bodies[j].y - bodies[i].y;
          const dist = Math.sqrt(dx * dx + dy * dy) + 0.5;
          const soften = Math.max(dist, (bodies[i].r + bodies[j].r) * 0.6);
          const f = G * bodies[j].m / (soften * soften);
          ax += f * dx / dist;
          ay += f * dy / dist;
        }
        bodies[i].vx += ax * dtFixed;
        bodies[i].vy += ay * dtFixed;
      }
      for (let i = 0; i < bodies.length; i++) {
        bodies[i].x += bodies[i].vx * dtFixed;
        bodies[i].y += bodies[i].vy * dtFixed;
        bodies[i].trail.push([bodies[i].x, bodies[i].y]);
        if (bodies[i].trail.length > TRAIL) bodies[i].trail.shift();
        if (bodies[i].x < -300 || bodies[i].x > W + 300 || bodies[i].y < -300 || bodies[i].y > H + 300) {
          bodies[i].x = W / 2 + rnd(-50, 50);
          bodies[i].y = H / 2 + rnd(-50, 50);
          bodies[i].vx = rnd(-60, 60);
          bodies[i].vy = rnd(-60, 60);
          bodies[i].trail = [];
        }
      }
      const used = new Set();
      for (let i = 0; i < bodies.length; i++) {
        if (used.has(i)) continue;
        for (let j = i + 1; j < bodies.length; j++) {
          if (used.has(j)) continue;
          const dx = bodies[j].x - bodies[i].x;
          const dy = bodies[j].y - bodies[i].y;
          if (Math.sqrt(dx * dx + dy * dy) < bodies[i].r + bodies[j].r - 2) {
            const a = bodies[i], b = bodies[j];
            const nm = a.m + b.m;
            a.x = (a.x * a.m + b.x * b.m) / nm;
            a.y = (a.y * a.m + b.y * b.m) / nm;
            a.vx = (a.vx * a.m + b.vx * b.m) / nm;
            a.vy = (a.vy * a.m + b.vy * b.m) / nm;
            a.m = nm; a.r = Math.max(a.r, Math.cbrt(nm) * 2.2);
            a.trail = []; used.add(j); merged++;
          }
        }
      }
      if (used.size > 0) bodies = bodies.filter((_, i) => !used.has(i));
    }

    function draw() {
      ctx.fillStyle = 'rgba(10,10,18,0.22)';
      ctx.fillRect(0, 0, W, H);
      for (const b of bodies) {
        if (b.trail.length > 1) {
          ctx.beginPath();
          ctx.moveTo(b.trail[0][0], b.trail[0][1]);
          for (let k = 1; k < b.trail.length; k++) ctx.lineTo(b.trail[k][0], b.trail[k][1]);
          ctx.strokeStyle = b.col + '55';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
      if (dragStart) {
        ctx.beginPath();
        ctx.arc(dragStart.x, dragStart.y, 8, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.fill();
      }
      for (const b of bodies) {
        const grd = ctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.1, b.x, b.y, b.r);
        grd.addColorStop(0, '#ffffff');
        grd.addColorStop(0.25, b.col);
        grd.addColorStop(1, b.col + '44');
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
        if (b.m > 80) {
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r + 5, 0, Math.PI * 2);
          ctx.strokeStyle = b.col + '55';
          ctx.lineWidth = 3;
          ctx.stroke();
        }
      }
      updateStats();
    }

    function updateStats() {
      document.getElementById('bodyCount').textContent = bodies.length;
      document.getElementById('mergedCount').textContent = merged;
    }

    function loop() {
      if (!paused) { step(); step(); }
      draw();
      requestAnimationFrame(loop);
    }

    document.getElementById('G').oninput = function () { G = +this.value; document.getElementById('Gval').textContent = this.value; };
    document.getElementById('numB').oninput = function () { document.getElementById('numBval').textContent = this.value; };
    document.getElementById('trail').oninput = function () { TRAIL = +this.value; document.getElementById('trailval').textContent = this.value; };
    document.getElementById('resetBtn').onclick = function () { spawnBodies(+document.getElementById('numB').value); };
    document.getElementById('pauseBtn').onclick = function () { paused = !paused; this.textContent = paused ? 'Resume' : 'Pause'; };
    document.getElementById('addSunBtn').onclick = addSun;

    spawnBodies(8);
    loop();
  </script>
</body>
</html>
